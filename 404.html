<!doctype html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <title>SGCJ-Gabon — Redirection</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <script>
      // Single Page Apps for GitHub Pages
      // https://github.com/rafgraph/spa-github-pages
      // Réécrit le path en query string puis renvoie vers index.html
      // qui restaurera l'URL d'origine avant que React Router démarre.
      (function () {
        var segmentCount = 0; // 0 car domaine custom à la racine (franklin-essono.com)
        var l = window.location;
        l.replace(
          l.protocol + '//' + l.hostname + (l.port ? ':' + l.port : '') +
          l.pathname.split('/').slice(0, 1 + segmentCount).join('/') + '/?/' +
          l.pathname.slice(1).split('/').slice(segmentCount).join('/').replace(/&/g, '~and~') +
          (l.search ? '&' + l.search.slice(1).replace(/&/g, '~and~') : '') +
          l.hash
        );
      })();
    </script>
  </head>
  <body></body>
</html>
